<aside class="app-sidebar" id="appSidebar" aria-label="Main navigation">
    <header class="sidebar-brand">
        <a href="{{ url_for('dashboard') }}"><span>HN</span><div><strong>HabitNexus</strong><small>Student workspace</small></div></a>
        <button type="button" id="sidebarClose" aria-label="Close navigation">Close</button>
    </header>

    <nav class="sidebar-navigation">
        <div class="sidebar-group">
            <span class="sidebar-label">Workspace</span>
            <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}"><svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/></svg><span>Dashboard</span></a>
            <a href="{{ url_for('analytics') }}" class="{% if request.endpoint == 'analytics' %}active{% endif %}"><svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg><span>Analytics</span></a>
            <a href="{{ url_for('calendar') }}" class="{% if request.endpoint in ['calendar', 'calendar_day'] %}active{% endif %}"><svg viewBox="0 0 24 24"><path d="M3 5h18v16H3zM7 3v4M17 3v4M3 10h18"/></svg><span>Calendar</span></a>
            <a href="{{ url_for('dsa_tracker') }}" class="{% if request.endpoint == 'dsa_tracker' %}active{% endif %}"><svg viewBox="0 0 24 24"><path d="m8 9-3 3 3 3M16 9l3 3-3 3M14 5l-4 14"/></svg><span>DSA workspace</span></a>
            <a href="{{ url_for('guide') }}" class="{% if request.endpoint == 'guide' %}active{% endif %}"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5zM8 7h8M8 11h8"/></svg><span>Guide</span></a>
        </div>

        <div class="sidebar-group">
            <span class="sidebar-label">Community</span>
            <a href="{{ url_for('friends_hub') }}" class="{% if request.endpoint in ['friends_hub', 'view_profile', 'challenge_friend'] %}active{% endif %}"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8M22 21v-2a4 4 0 0 0-3-3.87"/></svg><span>Friends</span></a>
            <a href="{{ url_for('leaderboard') }}" class="{% if request.endpoint == 'leaderboard' %}active{% endif %}"><svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4M7 6H4v2a4 4 0 0 0 4 4M17 6h3v2a4 4 0 0 1-4 4"/></svg><span>Leaderboard</span></a>
        </div>

        <div class="sidebar-group">
            <span class="sidebar-label">Account</span>
            {% if current_user.is_developer %}<a href="{{ url_for('developer_dashboard') }}" class="{% if request.endpoint and request.endpoint.startswith('developer_') %}active{% endif %}"><svg viewBox="0 0 24 24"><path d="M8 9l-4 3 4 3M16 9l4 3-4 3M14 5l-4 14"/></svg><span>Developer</span></a>{% endif %}
            <a href="{{ url_for('profile') }}" class="{% if request.endpoint == 'profile' %}active{% endif %}"><svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10"/></svg><span>Public profile</span></a>
            <a href="{{ url_for('notifications') }}" class="{% if request.endpoint == 'notifications' %}active{% endif %}"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/></svg><span>Notifications</span></a>
            <a href="{{ url_for('settings') }}" class="{% if request.endpoint == 'settings' %}active{% endif %}"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21h-4v-.1A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3v-4h.1A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06 2.83-2.83.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3h4v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.88-.34l.06-.06 2.83 2.83-.06.06A1.7 1.7 0 0 0 19.4 9c.14.38.35.72.6 1 .3.3.68.43 1.1.4h.1v4h-.1A1.7 1.7 0 0 0 19.4 15Z"/></svg><span>Settings</span></a>
        </div>
    </nav>

    <footer class="sidebar-account">
        <a href="{{ url_for('profile') }}"><img src="{{ current_user.profile_image or url_for('static', filename='images/default-avatar.svg') }}" alt=""><div><strong>{{ current_user.username }}</strong><span>{{ current_user.public_id }}</span></div></a>
        <form method="POST" action="{{ url_for('logout') }}"><input type="hidden" name="_csrf_token" value="{{ csrf_token() }}"><button type="submit">Sign out</button></form>
    </footer>
</aside>
